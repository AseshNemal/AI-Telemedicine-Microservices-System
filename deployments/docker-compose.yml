version: '3.8'

services:
  api-gateway:
    build: ../api-gateway-nginx
    container_name: api-gateway-nginx
    ports:
      - "80:80"
    depends_on:
      auth-service:
        condition: service_healthy
      patient-service:
        condition: service_healthy
      doctor-service:
        condition: service_healthy
      appointment-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      symptom-service:
        condition: service_healthy
    networks:
      - telemedicine-net
    restart: unless-stopped

  auth-service:
    build: ../services/auth-service-node
    container_name: auth-service
    env_file:
      - ../.env
    environment:
      - PORT=5001
      - NODE_ENV=development
      - FIREBASE_SERVICE_ACCOUNT_PATH=/var/secrets/firebase/service-account.json
    ports:
      - "5001:5001"
    depends_on:
      mongodb-auth:
        condition: service_started
    networks:
      - telemedicine-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5001/api/auth/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    volumes:
      - ./secrets:/var/secrets/firebase:ro

  patient-service:
    build: ../services/patient-service-node
    container_name: patient-service
    env_file:
      - ../.env
    environment:
      - PORT=5002
      - NODE_ENV=development
      - FIREBASE_SERVICE_ACCOUNT_PATH=/var/secrets/firebase/service-account.json
    ports:
      - "5002:5002"
    depends_on:
      mongodb-patient:
        condition: service_started
    networks:
      - telemedicine-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5002/api/patients/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    volumes:
      - ./secrets:/var/secrets/firebase:ro
      - patient-uploads:/app/uploads

  mongodb-auth:
    image: mongo:7.0-alpine
    container_name: mongodb-auth
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin
      - MONGO_INITDB_DATABASE=auth-db
    ports:
      - "27017:27017"
    volumes:
      - auth-db-data:/data/db
    networks:
      - telemedicine-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3

  mongodb-patient:
    image: mongo:7.0-alpine
    container_name: mongodb-patient
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin
      - MONGO_INITDB_DATABASE=patient-db
    ports:
      - "27018:27017"
    volumes:
      - patient-db-data:/data/db
    networks:
      - telemedicine-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3

  doctor-service:
    build: ../services/doctor-service
    container_name: doctor-service
    env_file:
      - ../.env
    environment:
      - PORT=8082
    ports:
      - "8082:8082"
    networks:
      - telemedicine-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8082/api/doctors/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  notification-service:
    build: ../services/notification-service
    container_name: notification-service
    env_file:
      - ../.env
    environment:
      - PORT=8084
    ports:
      - "8084:8084"
    networks:
      - telemedicine-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8084/api/notifications/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  appointment-service:
    build: ../services/appointment-service
    container_name: appointment-service
    env_file:
      - ../.env
    environment:
      - PORT=8083
      - NOTIFICATION_SERVICE_URL=http://notification-service:8084
    ports:
      - "8083:8083"
    depends_on:
      notification-service:
        condition: service_healthy
    networks:
      - telemedicine-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8083/api/appointments/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  symptom-service:
    build: ../services/AI-symptom-service
    container_name: symptom-service
    env_file:
      - ../.env
    environment:
      - PORT=8091
    ports:
      - "8091:8091"
    networks:
      - telemedicine-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8091/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  payment-service:
    build: ../services/payment-service
    container_name: payment-service
    env_file:
      - ../.env
    environment:
      - PORT=8085
      - DATABASE_URL=mongodb://admin:admin@mongodb-payment:27017/payment-db?authSource=admin
    ports:
      - "8085:8085"
    depends_on:
      mongodb-payment:
        condition: service_started
    networks:
      - telemedicine-net
    restart: unless-stopped

  telemedicine-service:
    build: ../services/telemedicine-service
    container_name: telemedicine-service
    env_file:
      - ../.env
    environment:
      - PORT=8086
    ports:
      - "8086:8086"
    networks:
      - telemedicine-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8086/api/telemedicine/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  mongodb-payment:
    image: mongo:7.0-alpine
    container_name: mongodb-payment
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin
      - MONGO_INITDB_DATABASE=payment-db
    ports:
      - "27019:27017"
    volumes:
      - payment-db-data:/data/db
    networks:
      - telemedicine-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3

  web-app:
    build: ../web-app
    container_name: web-app
    env_file:
      - ../.env
    environment:
      - NEXT_PUBLIC_AUTH_SERVICE_URL=http://localhost:5001
      - NEXT_PUBLIC_PATIENT_SERVICE_URL=http://localhost:5002
      - NEXT_PUBLIC_DOCTOR_SERVICE_URL=http://localhost:8082
      - NEXT_PUBLIC_APPOINTMENT_SERVICE_URL=http://localhost:8083
      - NEXT_PUBLIC_PAYMENT_SERVICE_URL=http://localhost:8085
      - SYMPTOM_SERVICE_URL=http://symptom-service:8091
      - NODE_ENV=development
    ports:
      - "3000:3000"
    depends_on:
      auth-service:
        condition: service_healthy
    networks:
      - telemedicine-net
    restart: unless-stopped

volumes:
  auth-db-data:
  patient-db-data:
  payment-db-data:
  patient-uploads:

networks:
  telemedicine-net:
    driver: bridge