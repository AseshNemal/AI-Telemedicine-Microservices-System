services:
  auth-service:
    build: ../services/auth-service
    env_file:
      - ../.env
    environment:
      - PORT=8081
    ports:
      - "8081:8081"
    networks:
      - telemedicine-net

  doctor-service:
    build: ../services/doctor-service
    env_file:
      - ../.env
    environment:
      - PORT=8082
    ports:
      - "8082:8082"
    networks:
      - telemedicine-net

  notification-service:
    build: ../services/notification-service
    environment:
      - PORT=8084
    ports:
      - "8084:8084"
    networks:
      - telemedicine-net

  appointment-service:
    build: ../services/appointment-service
    env_file:
      - ../.env
    environment:
      - PORT=8083
      - NOTIFICATION_SERVICE_URL=http://notification-service:8084
    depends_on:
      - notification-service
    ports:
      - "8083:8083"
    networks:
      - telemedicine-net

  web-app:
    build: ../web-app
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8081
      - DOCTOR_SERVICE_URL=http://doctor-service:8082
      - APPOINTMENT_SERVICE_URL=http://appointment-service:8083
      - NEXT_PUBLIC_AUTH_SERVICE_URL=http://localhost:8081
      - NEXT_PUBLIC_DOCTOR_SERVICE_URL=http://localhost:8082
      - NEXT_PUBLIC_APPOINTMENT_SERVICE_URL=http://localhost:8083
    depends_on:
      - auth-service
      - doctor-service
      - appointment-service
    ports:
      - "3000:3000"
    networks:
      - telemedicine-net

networks:
  telemedicine-net:
    driver: bridge