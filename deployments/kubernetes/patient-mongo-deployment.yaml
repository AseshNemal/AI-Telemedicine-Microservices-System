apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patient-mongo
  template:
    metadata:
      labels:
        app: patient-mongo
    spec:
      containers:
        - name: patient-mongo
          image: mongo:7
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: patient-mongo-storage
              mountPath: /data/db
      volumes:
        - name: patient-mongo-storage
          persistentVolumeClaim:
            claimName: patient-mongo-pvc
