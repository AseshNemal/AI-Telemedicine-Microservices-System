apiVersion: apps/v1
kind: Deployment
metadata:
  name: symptom-service
  namespace: default
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: symptom-service
  template:
    metadata:
      labels:
        app: symptom-service
    spec:
      containers:
        - name: symptom-service
          image: symptom-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8091
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: telemedicine-config
                  key: SYMPTOM_SERVICE_PORT
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: OPENAI_API_KEY
            - name: OPENAI_MODEL
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: OPENAI_MODEL
            - name: INTERNAL_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: INTERNAL_SERVICE_KEY
          
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          
          livenessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2

---
apiVersion: v1
kind: Service
metadata:
  name: symptom-service
  namespace: default
spec:
  selector:
    app: symptom-service
  ports:
    - port: 8091
      targetPort: 8091
      protocol: TCP
  type: ClusterIP
