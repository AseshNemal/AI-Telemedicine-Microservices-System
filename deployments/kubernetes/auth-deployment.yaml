apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: default
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: telemedicine-config
                  key: AUTH_PORT
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: telemedicine-config
                  key: NODE_ENV
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: DATABASE_URL
            - name: FIREBASE_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: FIREBASE_PROJECT_ID
            - name: FIREBASE_CLIENT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: FIREBASE_CLIENT_EMAIL
            - name: FIREBASE_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: FIREBASE_PRIVATE_KEY
            - name: FIREBASE_WEB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: FIREBASE_WEB_API_KEY
            - name: SENDGRID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: SENDGRID_API_KEY
            - name: SENDGRID_SENDER_EMAIL
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: SENDGRID_SENDER_EMAIL
            - name: INTERNAL_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: INTERNAL_SERVICE_KEY
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: ADMIN_EMAIL
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: ADMIN_PASSWORD

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2

---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: default
spec:
  selector:
    app: auth-service
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
  type: ClusterIP
