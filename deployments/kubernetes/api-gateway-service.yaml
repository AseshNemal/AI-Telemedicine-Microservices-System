apiVersion: v1
kind: Service
metadata:
    name: api-gateway-nginx
    namespace: default
    labels:
        app: api-gateway
        component: nginx
spec:
    type: LoadBalancer
    selector:
        app: api-gateway
        component: nginx
    ports:
        - name: http
          port: 80
          targetPort: 80
          protocol: TCP
    sessionAffinity: None
---
apiVersion: v1
kind: ConfigMap
metadata:
    name: api-gateway-nginx-config
    namespace: default
    labels:
        app: api-gateway
        component: nginx
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';

        access_log /var/log/nginx/access.log main;

        sendfile on;
        tcp_nopush on;
        keepalive_timeout 65;
        types_hash_max_size 2048;
        client_max_body_size 20M;

        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css text/xml text/javascript 
                   application/x-javascript application/xml+rss 
                   application/json application/javascript;

        limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
        limit_req_status 429;

        upstream auth_service {
            least_conn;
            server auth-service:8081 max_fails=3 fail_timeout=30s;
            keepalive 32;
        }

        upstream patient_service {
            least_conn;
            server patient-service:5002 max_fails=3 fail_timeout=30s;
            keepalive 32;
        }

        upstream doctor_service {
            least_conn;
            server doctor-service:8082 max_fails=3 fail_timeout=30s;
            keepalive 32;
        }

        upstream appointment_service {
            least_conn;
            server appointment-service:8083 max_fails=3 fail_timeout=30s;
            keepalive 32;
        }

        upstream notification_service {
            least_conn;
            server notification-service:8084 max_fails=3 fail_timeout=30s;
            keepalive 32;
        }

        upstream payment_service {
            least_conn;
            server payment-service:8085 max_fails=3 fail_timeout=30s;
            keepalive 32;
        }

        upstream telemedicine_service {
            least_conn;
            server telemedicine-service:8086 max_fails=3 fail_timeout=30s;
            keepalive 32;
        }

        upstream symptom_service {
            least_conn;
            server symptom-service:8091 max_fails=3 fail_timeout=30s;
            keepalive 32;
        }

        server {
            listen 80 default_server;
            server_name _;

            location /health {
                return 200 '{"status":"ok","service":"api-gateway"}';
                add_header Content-Type application/json;
            }

            location ~ ^/api/auth/?(.*)$ {
                limit_req zone=api_limit burst=20 nodelay;
                
                proxy_pass http://auth_service/api/auth/$1$is_args$args;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_cache_bypass $http_upgrade;
                proxy_connect_timeout 60s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;
            }

            location ~ ^/api/patients/?(.*)$ {
                limit_req zone=api_limit burst=20 nodelay;
                
                proxy_pass http://patient_service/api/patients/$1$is_args$args;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_cache_bypass $http_upgrade;
                proxy_connect_timeout 60s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;
            }

            location ~ ^/doctors/?(.*)$ {
                limit_req zone=api_limit burst=20 nodelay;
                
                proxy_pass http://doctor_service/doctors/$1$is_args$args;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_connect_timeout 60s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;
            }

            location ~ ^/doctor/?(.*)$ {
                limit_req zone=api_limit burst=20 nodelay;
                
                proxy_pass http://doctor_service/doctor/$1$is_args$args;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_connect_timeout 60s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;
            }

            location ~ ^/appointments/?(.*)$ {
                limit_req zone=api_limit burst=20 nodelay;
                
                proxy_pass http://appointment_service/appointments/$1$is_args$args;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_connect_timeout 60s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;
            }

            location ~ ^/send-email/?(.*)$ {
                limit_req zone=api_limit burst=10 nodelay;
                
                proxy_pass http://notification_service/send-email/$1$is_args$args;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_connect_timeout 60s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;
            }

            location ~ ^/send-sms/?(.*)$ {
                limit_req zone=api_limit burst=10 nodelay;
                
                proxy_pass http://notification_service/send-sms/$1$is_args$args;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_connect_timeout 60s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;
            }

            location ~ ^/payments/?(.*)$ {
                limit_req zone=api_limit burst=20 nodelay;
                
                proxy_pass http://payment_service/payments/$1$is_args$args;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_connect_timeout 60s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;
            }

            location ~ ^/webhook/?(.*)$ {
                proxy_pass http://payment_service/webhook/$1$is_args$args;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_connect_timeout 60s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;
            }

            location ~ ^/telemedicine/?(.*)$ {
                limit_req zone=api_limit burst=20 nodelay;

                proxy_pass http://telemedicine_service/telemedicine/$1$is_args$args;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_connect_timeout 60s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;
            }

            location ~ ^/api/symptoms/?(.*)$ {
                limit_req zone=api_limit burst=20 nodelay;

                proxy_pass http://symptom_service/symptoms/$1$is_args$args;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_connect_timeout 120s;
                proxy_send_timeout 120s;
                proxy_read_timeout 120s;
            }

            location /api-docs {
                proxy_pass http://auth_service;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            location = / {
                return 301 /api-docs;
            }

            location / {
                return 404 '{"error":"Not found","path":"$uri"}';
                add_header Content-Type application/json;
            }

            error_page 502 503 504 /50x.html;
            location = /50x.html {
                return 502 '{"error":"Service unavailable"}';
                add_header Content-Type application/json;
            }
        }
    }
