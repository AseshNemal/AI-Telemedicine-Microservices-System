apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: default
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: notification-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: telemedicine-config
                  key: NOTIFICATION_PORT
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: telemedicine-config
                  key: NODE_ENV
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: TWILIO_ACCOUNT_SID
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: TWILIO_AUTH_TOKEN
            - name: TWILIO_PHONE_NUMBER
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: TWILIO_PHONE_NUMBER
            - name: SENDGRID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: SENDGRID_API_KEY
            - name: SENDGRID_SENDER_EMAIL
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: SENDGRID_SENDER_EMAIL
            - name: INTERNAL_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: INTERNAL_SERVICE_KEY

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

          livenessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2

---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: default
spec:
  selector:
    app: notification-service
  ports:
    - port: 8084
      targetPort: 8084
      protocol: TCP
  type: ClusterIP
