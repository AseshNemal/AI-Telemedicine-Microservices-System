apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemedicine-service
  namespace: default
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: telemedicine-service
  template:
    metadata:
      labels:
        app: telemedicine-service
    spec:
      containers:
        - name: telemedicine-service
          image: telemedicine-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8086
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: telemedicine-config
                  key: TELEMEDICINE_PORT
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: telemedicine-config
                  key: NODE_ENV
            - name: LIVEKIT_URL
              valueFrom:
                configMapKeyRef:
                  name: telemedicine-config
                  key: LIVEKIT_URL
            - name: LIVEKIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: LIVEKIT_API_KEY
            - name: LIVEKIT_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: LIVEKIT_API_SECRET
            - name: INTERNAL_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: INTERNAL_SERVICE_KEY

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

          # Added missing probes
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2

---
apiVersion: v1
kind: Service
metadata:
  name: telemedicine-service
  namespace: default
spec:
  selector:
    app: telemedicine-service
  ports:
    - port: 8086
      targetPort: 8086
      protocol: TCP
  type: ClusterIP
