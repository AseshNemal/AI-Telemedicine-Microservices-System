apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: default
  labels:
    app: payment-service
    component: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        component: backend
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - payment-service
              topologyKey: kubernetes.io/hostname
      containers:
      - name: payment-service
        image: payment-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8085
          protocol: TCP
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: telemedicine-config
              key: PAYMENT_PORT
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: telemedicine-config
              key: NODE_ENV
        - name: APPOINTMENT_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: telemedicine-config
              key: APPOINTMENT_SERVICE_URL
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: telemedicine-secrets
              key: DATABASE_URL
        - name: STRIPE_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: telemedicine-secrets
              key: STRIPE_SECRET_KEY
        - name: STRIPE_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: telemedicine-secrets
              key: STRIPE_WEBHOOK_SECRET
        - name: STRIPE_PUBLIC_KEY
          valueFrom:
            secretKeyRef:
              name: telemedicine-secrets
              key: STRIPE_PUBLIC_KEY
        - name: INTERNAL_SERVICE_KEY
          valueFrom:
            secretKeyRef:
              name: telemedicine-secrets
              key: INTERNAL_SERVICE_KEY

        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: default
  labels:
    app: payment-service
    component: backend
spec:
  type: ClusterIP
  selector:
    app: payment-service
  ports:
  - name: http
    port: 8085
    targetPort: http
    protocol: TCP
  sessionAffinity: None
