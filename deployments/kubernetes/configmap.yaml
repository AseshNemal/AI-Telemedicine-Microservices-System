apiVersion: v1
kind: ConfigMap
metadata:
  name: telemedicine-config
  namespace: default
data:
  AUTH_PORT: "8081"
  DOCTOR_PORT: "8082"
  APPOINTMENT_PORT: "8083"
  NOTIFICATION_PORT: "8084"
  TELEMEDICINE_PORT: "8086"
  NOTIFICATION_SERVICE_URL: "http://notification-service:8084"
