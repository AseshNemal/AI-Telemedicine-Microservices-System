apiVersion: v1
kind: Secret
metadata:
  name: telemedicine-secrets
  namespace: default
type: Opaque
stringData:
  # NOTE: All sensitive values are loaded from root .env file
  # This Secret is populated dynamically by deploy-k8s.sh script
  # Do NOT edit values here - update root .env file instead
  # Placeholder keys (values set at deploy-time from .env)
  DATABASE_URL: "<set-at-deploy-time>"
  FIREBASE_PROJECT_ID: "<set-at-deploy-time>"
  FIREBASE_CLIENT_EMAIL: "<set-at-deploy-time>"
  FIREBASE_PRIVATE_KEY: "<set-at-deploy-time>"
  FIREBASE_SERVICE_ACCOUNT_PATH: "/var/secrets/firebase/service-account.json"
  FIREBASE_WEB_API_KEY: "<set-at-deploy-time>"
  NEXT_PUBLIC_FIREBASE_API_KEY: "<set-at-deploy-time>"
  GOOGLE_CLIENT_ID: "<set-at-deploy-time>"
  GOOGLE_CLIENT_SECRET: "<set-at-deploy-time>"
  OPENAI_API_KEY: "<set-at-deploy-time>"
  OPENAI_MODEL: "<set-at-deploy-time>"
  TWILIO_ACCOUNT_SID: "<set-at-deploy-time>"
  TWILIO_AUTH_TOKEN: "<set-at-deploy-time>"
  TWILIO_PHONE_NUMBER: "<set-at-deploy-time>"
  SENDGRID_API_KEY: "<set-at-deploy-time>"
  SENDGRID_SENDER_EMAIL: "<set-at-deploy-time>"
  LIVEKIT_API_KEY: "<set-at-deploy-time>"
  LIVEKIT_API_SECRET: "<set-at-deploy-time>"
  LIVEKIT_URL: "<set-at-deploy-time>"
  STRIPE_SECRET_KEY: "<set-at-deploy-time>"
  STRIPE_WEBHOOK_SECRET: "<set-at-deploy-time>"
  STRIPE_PUBLIC_KEY: "<set-at-deploy-time>"
  INTERNAL_SERVICE_KEY: "<set-at-deploy-time>"
