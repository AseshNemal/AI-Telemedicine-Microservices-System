apiVersion: v1
kind: Secret
metadata:
  name: telemedicine-secrets
  namespace: default
type: Opaque
stringData:
  # DO NOT store secrets in the repo. This file should contain a placeholder; the
  # real value will be created at deploy time from your local .env using kubectl.
  # Example (run locally):
  #   grep -E '^(DATABASE_URL|LIVEKIT_API_KEY|LIVEKIT_API_SECRET)=' .env > k8s.env
  #   kubectl create secret generic telemedicine-secrets --from-env-file=k8s.env \
  #     --namespace=default --dry-run=client -o yaml | kubectl apply -f -
  DATABASE_URL: "<set-at-deploy-time>"
  LIVEKIT_API_KEY: "<set-at-deploy-time>"
  LIVEKIT_API_SECRET: "<set-at-deploy-time>"
