apiVersion: v1
kind: Secret
metadata:
  name: telemedicine-secrets-example
  namespace: default
type: Opaque
stringData:
  # This is an example placeholder file. DO NOT commit real credentials.
  # Use this file as a template for creating a Kubernetes secret locally, e.g.:
  #   kubectl create secret generic telemedicine-secrets --from-file=secret.yaml=./deployments/kubernetes/secret.example.yaml

  DATABASE_URL: "REDACTED_REPLACE_WITH_YOUR_DATABASE_URL"
  FIREBASE_PROJECT_ID: "REDACTED_FIREBASE_PROJECT_ID"
  FIREBASE_CLIENT_EMAIL: "REDACTED_FIREBASE_CLIENT_EMAIL"
  FIREBASE_PRIVATE_KEY: "REDACTED_FIREBASE_PRIVATE_KEY"
  FIREBASE_WEB_API_KEY: "REDACTED_FIREBASE_WEB_API_KEY"

  GOOGLE_CLIENT_ID: "REDACTED_GOOGLE_CLIENT_ID"
  GOOGLE_CLIENT_SECRET: "REDACTED_GOOGLE_CLIENT_SECRET"

  OPENAI_API_KEY: "REDACTED_OPENAI_API_KEY"
  OPENAI_MODEL: "gpt-4o-mini"

  TWILIO_ACCOUNT_SID: "REDACTED_TWILIO_ACCOUNT_SID"
  TWILIO_AUTH_TOKEN: "REDACTED_TWILIO_AUTH_TOKEN"
  TWILIO_PHONE_NUMBER: "+10000000000"

  SENDGRID_API_KEY: "REDACTED_SENDGRID_API_KEY"
  SENDGRID_SENDER_EMAIL: "you@example.com"

  LIVEKIT_API_KEY: "REDACTED_LIVEKIT_API_KEY"
  LIVEKIT_API_SECRET: "REDACTED_LIVEKIT_API_SECRET"

  STRIPE_SECRET_KEY: "REDACTED_STRIPE_SECRET_KEY"
  STRIPE_WEBHOOK_SECRET: "REDACTED_STRIPE_WEBHOOK_SECRET"
  STRIPE_PUBLIC_KEY: "REDACTED_STRIPE_PUBLIC_KEY"

  ADMIN_EMAIL: "admin@example.com"
  ADMIN_PASSWORD: "change-me"

  INTERNAL_SERVICE_KEY: "REDACTED_INTERNAL_SERVICE_KEY"

# IMPORTANT:
# - Do NOT commit real secrets. Keep `secret.yaml` local and add it to .gitignore.
# - This example uses a non-runtime name (`telemedicine-secrets-example`) to prevent accidental overwrite.
# - Runtime deployments expect Secret name: `telemedicine-secrets`.
# - To create the runtime secret from local values (keeps values out of git):
#     kubectl create secret generic telemedicine-secrets --from-env-file=./deployments/kubernetes/secret.example.env
#   or
#     kubectl create secret generic telemedicine-secrets --from-file=secret.yaml=./path/to/local/secret.yaml
