apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appointment-service
  template:
    metadata:
      labels:
        app: appointment-service
    spec:
      containers:
        - name: appointment-service
          image: appointment-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: telemedicine-config
                  key: APPOINTMENT_PORT
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: DATABASE_URL
            - name: NOTIFICATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: telemedicine-config
                  key: NOTIFICATION_SERVICE_URL
---
apiVersion: v1
kind: Service
metadata:
  name: appointment-service
spec:
  selector:
    app: appointment-service
  ports:
    - port: 8083
      targetPort: 8083
      protocol: TCP
  type: ClusterIP
