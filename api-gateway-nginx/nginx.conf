user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip compression for faster responses
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/json application/javascript;

    # Rate limiting (10 requests per second per IP)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_status 429;

    # Upstream service definitions
    upstream auth_service {
        least_conn;
        server auth-service:8081 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream patient_service {
        least_conn;
        server patient-service:5002 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream doctor_service {
        least_conn;
        server doctor-service:8082 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream appointment_service {
        least_conn;
        server appointment-service:8083 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream notification_service {
        least_conn;
        server notification-service:8084 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream payment_service {
        least_conn;
        server payment-service:8085 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream telemedicine_service {
        least_conn;
        server telemedicine-service:8086 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream symptom_service {
        least_conn;
        server symptom-service:8091 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Main API Gateway server
    server {
        listen 80 default_server;
        server_name _;

        # Health check
        location /health {
            return 200 '{"status":"ok","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Auth Service
        location /api/auth/ {
            proxy_pass http://auth_service/;
        }

        # Patient Service
        location /api/patients/ {
            proxy_pass http://patient_service/;
        }

        # Doctor Service
        location /api/doctors/ {
            proxy_pass http://doctor_service/;
        }

        # Appointment Service
        location /api/appointments/ {
            proxy_pass http://appointment_service/;
        }

        # Notification Service
        location /api/notifications/ {
            proxy_pass http://notification_service/;
        }

        # Payment Service
        location /api/payments/ {
            proxy_pass http://payment_service/;
        }

        # Telemedicine Service
        location /api/telemedicine/ {
            proxy_pass http://telemedicine_service/;
        }

        # AI Symptom Service
        location /api/symptoms/ {
            proxy_pass http://symptom_service/;
        }

        # Default
        location / {
            return 404 '{"error":"Not found","path":"$uri"}';
            add_header Content-Type application/json;
        }
    }
}
