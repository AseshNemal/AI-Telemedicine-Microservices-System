user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip compression for faster responses
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/json application/javascript;

    # Rate limiting (10 requests per second per IP)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_status 429;

    # Upstream service definitions
    upstream auth_service {
        least_conn;
        server auth-service-node:5001 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream patient_service {
        least_conn;
        server patient-service-node:5002 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream doctor_service {
        least_conn;
        server doctor-service:8082 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream appointment_service {
        least_conn;
        server appointment-service:8083 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream notification_service {
        least_conn;
        server notification-service:8084 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Main API Gateway server
    server {
        listen 80 default_server;
        server_name _;

        # Health check endpoint
        location /health {
            return 200 '{"status":"ok","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        # Auth Service endpoints
        location ~ ^/api/auth/?(.*)$ {
            limit_req zone=api_limit burst=20 nodelay;
            
            proxy_pass http://auth_service/$1$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Patient Service endpoints
        location ~ ^/api/patients/?(.*)$ {
            limit_req zone=api_limit burst=20 nodelay;
            
            proxy_pass http://patient_service/$1$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Doctor Service endpoints
        location ~ ^/doctors/?(.*)$ {
            limit_req zone=api_limit burst=20 nodelay;
            
            proxy_pass http://doctor_service/doctors/$1$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location ~ ^/doctor/?(.*)$ {
            limit_req zone=api_limit burst=20 nodelay;
            
            proxy_pass http://doctor_service/doctor/$1$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Appointment Service endpoints
        location ~ ^/appointments/?(.*)$ {
            limit_req zone=api_limit burst=20 nodelay;
            
            proxy_pass http://appointment_service/appointments/$1$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Notification Service endpoints
        location ~ ^/send-email/?(.*)$ {
            limit_req zone=api_limit burst=10 nodelay;
            
            proxy_pass http://notification_service/send-email/$1$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location ~ ^/send-sms/?(.*)$ {
            limit_req zone=api_limit burst=10 nodelay;
            
            proxy_pass http://notification_service/send-sms/$1$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # API Documentation (aggregated)
        location ~ ^/api-docs/?$ {
            proxy_pass http://auth_service/api-docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Root redirect to API docs
        location = / {
            return 301 /api-docs;
        }

        # 404 for unmatched routes
        location / {
            return 404 '{"error":"Not found","path":"$uri"}';
            add_header Content-Type application/json;
        }

        # Error handling
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            return 502 '{"error":"Service unavailable"}';
            add_header Content-Type application/json;
        }
    }
}
