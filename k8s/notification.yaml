apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: notification-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
          env:
            - name: INTERNAL_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: INTERNAL_SERVICE_KEY
            - name: SENDGRID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: SENDGRID_API_KEY
            - name: SENDGRID_SENDER_EMAIL
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: SENDGRID_SENDER_EMAIL
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: TWILIO_ACCOUNT_SID
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: TWILIO_AUTH_TOKEN
            - name: TWILIO_PHONE_NUMBER
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: TWILIO_PHONE_NUMBER
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  selector:
    app: notification-service
  ports:
    - port: 8084
      targetPort: 8084