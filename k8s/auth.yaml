apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: PORT
              value: "8081"

            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: DATABASE_URL

            - name: INTERNAL_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: INTERNAL_SERVICE_KEY

            - name: PATIENT_SERVICE_URL
              value: http://patient-service:5002

            - name: FIREBASE_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: FIREBASE_PROJECT_ID

            - name: FIREBASE_CLIENT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: FIREBASE_CLIENT_EMAIL

            - name: FIREBASE_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: FIREBASE_PRIVATE_KEY

            - name: FIREBASE_WEB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: FIREBASE_WEB_API_KEY

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - port: 8081
      targetPort: 8081