apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway-nginx
  template:
    metadata:
      labels:
        app: api-gateway-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: config
          configMap:
            name: api-gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-nginx
spec:
  selector:
    app: api-gateway-nginx
  ports:
    - port: 80
      targetPort: 80