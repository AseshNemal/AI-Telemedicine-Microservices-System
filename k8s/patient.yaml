apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
    spec:
      containers:
        - name: patient-service
          image: patient-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5002
          env:
            - name: PORT
              value: "5002"

            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: DATABASE_URL

            - name: INTERNAL_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: INTERNAL_SERVICE_KEY

            - name: FIREBASE_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: FIREBASE_PROJECT_ID

            - name: FIREBASE_CLIENT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: FIREBASE_CLIENT_EMAIL

            - name: FIREBASE_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: telemedicine-secrets
                  key: FIREBASE_PRIVATE_KEY

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: patient-service
spec:
  selector:
    app: patient-service
  ports:
    - port: 5002
      targetPort: 5002